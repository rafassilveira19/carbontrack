<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Plataforma - CarbonTrack</title>
  <link rel="stylesheet" href="plataforma.css">
</head>
<body>

<header class="navbar">
  <h2>CarbonTrack</h2>

  <div class="user-area">
    <span id="userEmail"></span>
    <button onclick="logout()">Sair</button>
  </div>
</header>

<h2>Calculadora de Carbono</h2>

<div class="calculadora">

  <div class="calc-grid">

    <div>
      <label>Energia (kWh/mês)</label>
      <input type="number" id="energia">
    </div>

    <div>
      <label>Diesel (litros/mês)</label>
      <input type="number" id="diesel">
    </div>

    <div>
      <label>Gasolina (litros/mês)</label>
      <input type="number" id="gasolina">
    </div>

    <div>
      <label>Transporte (km/mês)</label>
      <input type="number" id="transporte">
    </div>

  </div>

  <button onclick="calcularCarbono()">Calcular</button>

  <div id="resultadoCalc" class="resultado"></div>

</div>

<script type="module" src="plataforma.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</body>
</html>
