<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Plataforma - CarbonTrack</title>
  <link rel="stylesheet" href="plataforma.css">
</head>
<body>

<header class="navbar">
  <h2>CarbonTrack</h2>

  <div class="user-area">
    <span id="userEmail"></span>
    <button onclick="logout()">Sair</button>
  </div>
</header>

<main class="dashboard">

  <h1>Dashboard</h1>

  <h2>Resumo</h2>

<div class="metrics">
  <div class="metric-card">
    <h3 id="totalCreditos">0</h3>
    <p>Créditos Totais</p>
  </div>

  <div class="metric-card">
    <h3 id="totalProjetos">0</h3>
    <p>Projetos</p>
  </div>

  <div class="metric-card">
    <h3 id="mediaCreditos">0</h3>
    <p>Média por Projeto</p>
  </div>
</div>

<h2>Gráfico</h2>
<canvas id="grafico"></canvas>

<script type="module" src="plataforma.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</body>
</html>
